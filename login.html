<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Relatório de Atividades</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="login.css" />
</head>
<body>

  <div class="page">
    <div class="card">

      <div class="logo">
        <h1><span class="gold-dot"></span>Relatório de Atividades</h1>
        <p>Acesso ao sistema</p>
        <div class="logo-line"></div>
      </div>

      <div id="erro" class="erro">Usuário ou senha incorretos.</div>

      <div class="field">
        <label>Usuário</label>
        <input type="text" id="usuario" placeholder="Digite seu usuário" />
      </div>

      <div class="field">
        <label>Senha</label>
        <input type="password" id="senha" placeholder="••••••••" />
      </div>

      <button class="btn-login" onclick="entrar()">Entrar</button>

    </div>
  </div>

  <script src="config.js"></script>
  <script src="login.js"></script>
</body>
</html>
